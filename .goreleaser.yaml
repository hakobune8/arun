version: 2
project_name: arun

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/arun
    binary: arun
    ldflags:
      - -X github.com/hakobune8/arun/internal/cli.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: hakobune8
    name: arun
  draft: false
  prerelease: auto
