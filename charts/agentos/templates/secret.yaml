{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if or .Values.secrets.litellmApiKey .Values.env.LITELLM_API_KEY }}
  LITELLM_API_KEY: "{{ default .Values.env.LITELLM_API_KEY .Values.secrets.litellmApiKey }}"
  {{- end }}
  {{- if or .Values.secrets.githubToken .Values.env.GITHUB_TOKEN }}
  GITHUB_TOKEN: "{{ default .Values.env.GITHUB_TOKEN .Values.secrets.githubToken }}"
  {{- end }}
  {{- if .Values.secrets.githubAppPrivateKey }}
  GITHUB_APP_PRIVATE_KEY: |-
{{ .Values.secrets.githubAppPrivateKey | nindent 4 }}
  {{- end }}
  {{- if .Values.secrets.githubOAuthClientSecret }}
  GITHUB_OAUTH_CLIENT_SECRET: "{{ .Values.secrets.githubOAuthClientSecret }}"
  {{- end }}
  {{- if .Values.secrets.agentosSessionSecret }}
  AGENTOS_SESSION_SECRET: "{{ .Values.secrets.agentosSessionSecret }}"
  {{- end }}
{{- end }}
