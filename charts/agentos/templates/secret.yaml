apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.env.LITELLM_API_KEY }}
  LITELLM_API_KEY: "{{ .Values.env.LITELLM_API_KEY }}"
  {{- end }}
  {{- if .Values.env.GITHUB_TOKEN }}
  GITHUB_TOKEN: "{{ .Values.env.GITHUB_TOKEN }}"
  {{- end }}
