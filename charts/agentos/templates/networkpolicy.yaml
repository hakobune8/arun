{{- $networkPolicy := default dict (get .Values "networkPolicy") }}
{{- if default false (get $networkPolicy "enabled") }}
{{- $ingressCIDRs := default (list) (get $networkPolicy "ingressCIDRs") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if $ingressCIDRs }}
        {{- range $ingressCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
